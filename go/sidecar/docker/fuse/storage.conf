[storage]
driver = "overlay"

[storage.options]
# Use fuse-overlayfs as the mount program so overlay works in userspace without
# CAP_SYS_ADMIN. Requires /dev/fuse (provided via a hostPath volume in the pod
# spec) and the fuse-overlayfs binary installed in the image.
mount_program = "/usr/bin/fuse-overlayfs"
ignore_chown_errors = "true"
