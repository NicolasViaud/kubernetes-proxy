[containers]
# Use Podman's own user namespace for containers. Podman re-execs itself into
# a user namespace where it is UID 0; containers then share that namespace
# (no nested user-namespace creation, no newuidmap call needed).
userns = "host"

[network]
# With baseline PSA /dev/fuse is available but /dev/net/tun is still absent.
# The Docker API proxy rewrites NetworkMode to "host" on containers/create, so
# slirp4netns is never invoked in practice. Keep as fallback.
default_rootless_network_cmd = "slirp4netns"
