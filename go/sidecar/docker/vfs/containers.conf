[containers]
# Use Podman's own user namespace for containers. Podman re-execs itself into
# a user namespace where it is UID 0; containers then share that namespace
# (no nested user-namespace creation, no newuidmap call needed).
userns = "host"

[network]
# netavark (Podman's default network backend) needs /run/netns which is not
# writable inside the pod. The Docker API proxy (dockerproxy.go) rewrites every
# containers/create request so NetworkMode is "host", bypassing network namespace
# creation entirely — so this setting is a safety fallback only.
default_rootless_network_cmd = "slirp4netns"
