# kind cluster configuration for local development.
#
# Create with: kind create cluster --config k8s/kind-config.yaml
#
# The Istio CNI DaemonSet runs as a privileged pod on every node and installs
# its plugin binary + chained config directly into the node's /opt/cni/bin and
# /etc/cni/net.d directories.  No host mounts are required.

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: kubernetes-proxy

networking:
  # Keep kindnet as the primary CNI; Istio CNI chains on top of it.
  disableDefaultCNI: false

nodes:
  - role: control-plane
  - role: worker
  - role: worker
