# proxy namespace — no special Istio label needed; proxy pods are NOT intercepted.
apiVersion: v1
kind: Namespace
metadata:
  name: proxy
---
# app namespace — labelled so Istio CNI sets up iptables redirect rules on pods.
#
# The label "istio-injection: enabled" is read by two independent components:
#   1. Istio CNI node agent  → sets up iptables rules in the pod network namespace
#   2. Istio sidecar-injector webhook → injects Envoy as a sidecar
#
# We want (1) but NOT (2).  The webhook is patched in
# k8s/istio/patch-webhook.yaml to use a different namespace selector label
# ("istio-sidecar-injection: enabled"), so labelling the app namespace with
# only "istio-injection: enabled" triggers CNI without webhook injection.
#
# Pod Security Admission: "baseline" is required by the rootless-Docker sidecar.
#
# Rootless Docker uses Linux user namespaces (CLONE_NEWUSER) to run dockerd as
# a non-root user. The kernel blocks CLONE_NEWUSER when no_new_privs=1, which
# is exactly what allowPrivilegeEscalation: false sets. Therefore the sidecar
# must set allowPrivilegeEscalation: true — incompatible with "restricted" PSA.
#
# "baseline" still prevents:
#   • privileged: true          (no full kernel access)
#   • hostNetwork / hostPID     (no host namespace sharing)
#   • dangerous capabilities    (CAP_SYS_ADMIN, etc. still blocked)
#
# The app container itself remains fully restricted (non-root, drop ALL caps,
# readOnlyRootFilesystem, RuntimeDefault seccomp). Only the sidecar is relaxed.
apiVersion: v1
kind: Namespace
metadata:
  name: app
  labels:
    istio-injection: enabled
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/audit: restricted
