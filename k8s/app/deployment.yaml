apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  namespace: app
  labels:
    app: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app
  template:
    metadata:
      labels:
        app: app
      annotations:
        # ================================================================= #
        # CNI MODE A — Istio CNI                          (make istio-install) #
        # ================================================================= #
        # Istio CNI reads these annotations and runs istio-iptables in the
        # pod network namespace before any container starts.
        #
        # KNOWN LIMITATION (Istio 1.23 sidecar mode): the CNI binary plugin
        # only processes pods that have a container named exactly "istio-proxy".
        # Rename the sidecar container to "istio-proxy" to activate this mode.
        traffic.sidecar.istio.io/includeOutboundIPRanges: "*"
        traffic.sidecar.istio.io/includeInboundPorts: ""
        traffic.sidecar.istio.io/excludeOutboundPorts: "53"
        sidecar.istio.io/proxyUID: "1337"
        sidecar.istio.io/proxyGID: "1337"

        # ================================================================= #
        # CNI MODE B — Custom egress-proxy CNI plugin     (make cni-install) #
        # ================================================================= #
        # The custom plugin selects pods by NAMESPACE (configured in the
        # DaemonSet env var INTERCEPT_NAMESPACES).  No pod annotations or
        # special container names are required.  The annotations above are
        # silently ignored when only the custom CNI is installed.
    spec:
      # ------------------------------------------------------------------ #
      # Pod-level security context (required by "restricted" PSA)           #
      # ------------------------------------------------------------------ #
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault

      containers:
        # ---------------------------------------------------------------- #
        # Application container                                             #
        # ---------------------------------------------------------------- #
        - name: app
          image: app:latest
          imagePullPolicy: Never
          env:
            - name: TARGETS
              value: "http://httpbin.org/get,https://httpbin.org/get,http://example.com"
            - name: INTERVAL
              value: "15s"
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10000
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault

        # ---------------------------------------------------------------- #
        # Custom sidecar — transparent egress proxy                        #
        # ---------------------------------------------------------------- #
        - name: sidecar
          image: sidecar:latest
          imagePullPolicy: Never
          ports:
            - name: proxy
              containerPort: 15001
              protocol: TCP
          env:
            - name: LISTEN_ADDR
              value: ":15001"
            # DNS name resolves to the ClusterIP of the central proxy.
            - name: PROXY_ADDR
              value: "proxy-service.proxy.svc.cluster.local:8080"
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            # UID 1337 matches sidecar.istio.io/proxyUID above.
            # Istio CNI adds an iptables rule: -m owner --uid-owner 1337 -j RETURN
            # which exempts this UID from the OUTPUT redirect chain.
            runAsUser: 1337
            runAsGroup: 1337
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
