apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  namespace: app
  labels:
    app: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app
  template:
    metadata:
      labels:
        app: app
      annotations:
        # ================================================================= #
        # CNI MODE A — Istio CNI                          (make istio-install) #
        # ================================================================= #
        # Istio CNI reads these annotations and runs istio-iptables in the
        # pod network namespace before any container starts.
        #
        # Istio CNI 1.22+ node agent checks for the "sidecar.istio.io/status"
        # annotation (normally set by the injector webhook) to decide whether
        # to run istio-iptables in the pod netns.  Because we patched the
        # webhook to a different label (see patch-webhook.yaml), the annotation
        # is never injected automatically — we must set it explicitly.
        # The value only needs to be present; a minimal JSON is sufficient.
        # The pod must also have a container named exactly "istio-proxy".
        sidecar.istio.io/status: '{"containers":["istio-proxy"]}'
        traffic.sidecar.istio.io/includeOutboundIPRanges: "*"
        traffic.sidecar.istio.io/includeInboundPorts: ""
        traffic.sidecar.istio.io/excludeOutboundPorts: "53"
        sidecar.istio.io/proxyUID: "1337"
        sidecar.istio.io/proxyGID: "1337"

        # ================================================================= #
        # CNI MODE B — Custom egress-proxy CNI plugin     (make cni-install) #
        # ================================================================= #
        # The custom plugin selects pods by NAMESPACE (configured in the
        # DaemonSet env var INTERCEPT_NAMESPACES).  No pod annotations or
        # special container names are required.  The annotations above are
        # silently ignored when only the custom CNI is installed.
    spec:
      # ------------------------------------------------------------------ #
      # Pod-level security context (required by "restricted" PSA)           #
      # ------------------------------------------------------------------ #
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault

      volumes:
        # Shared Unix socket directory: the sidecar writes /run/docker/docker.sock
        # and the app reads it via DOCKER_HOST=unix:///run/docker/docker.sock.
        - name: docker-socket
          emptyDir: {}
        # Writable /tmp for the sidecar: Podman uses XDG_RUNTIME_DIR=/tmp/podman-runtime
        # for its runtime socket and state files.
        - name: sidecar-tmp
          emptyDir: {}
        # Writable home directory for the sidecar user: Podman stores image layers in
        # ~/.local/share/containers and config in ~/.config/containers.
        - name: sidecar-home
          emptyDir: {}

      containers:
        # ---------------------------------------------------------------- #
        # Application container                                             #
        # ---------------------------------------------------------------- #
        - name: app
          image: app:latest
          imagePullPolicy: Never
          env:
            - name: TARGETS
              value: "http://httpbin.org/get,https://httpbin.org/get,http://example.com"
            - name: INTERVAL
              value: "15s"
            # Point the Docker CLI at the rootless daemon socket exposed by
            # the sidecar container through the shared emptyDir volume.
            - name: DOCKER_HOST
              value: unix:///run/docker/docker.sock
          volumeMounts:
            - name: docker-socket
              mountPath: /run/docker
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10000
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault

        # ---------------------------------------------------------------- #
        # Custom sidecar — transparent egress proxy + rootless Podman service #
        # ---------------------------------------------------------------- #
        - name: istio-proxy
          image: sidecar:latest
          imagePullPolicy: Never
          ports:
            - name: proxy
              containerPort: 15001
              protocol: TCP
          env:
            - name: LISTEN_ADDR
              value: ":15001"
            # DNS name resolves to the ClusterIP of the central proxy.
            - name: PROXY_ADDR
              value: "proxy-service.proxy.svc.cluster.local:8080"
          volumeMounts:
            - name: docker-socket
              mountPath: /run/docker
            - name: sidecar-tmp
              mountPath: /tmp
            - name: sidecar-home
              mountPath: /home/sidecar
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            # Podman performs uid_map setup from INSIDE the new user namespace,
            # so it never calls the SUID newuidmap helper from outside.
            # This means allowPrivilegeEscalation: false and drop: ALL are safe.
            allowPrivilegeEscalation: false
            # Podman writes image layers to $HOME and runtime files to /tmp;
            # both are covered by the emptyDir volume mounts below, so the
            # root filesystem can remain writable for Podman's own startup writes.
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            # UID 1337 matches sidecar.istio.io/proxyUID above.
            # Istio CNI adds an iptables rule: -m owner --uid-owner 1337 -j RETURN
            # which exempts this UID from the OUTPUT redirect chain.
            runAsUser: 1337
            runAsGroup: 1337
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              # RuntimeDefault blocks CLONE_NEWUSER which Podman needs to create
              # user namespaces for rootless containers. A Localhost profile is
              # used instead — "Localhost" is permitted by the restricted PSA and
              # the profile lives at /var/lib/kubelet/seccomp/podman.json on each
              # node (deployed via `kind load` or the CNI DaemonSet init step).
              type: Localhost
              localhostProfile: podman.json
