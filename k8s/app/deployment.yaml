apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  namespace: app
  labels:
    app: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app
  template:
    metadata:
      labels:
        app: app
      annotations:
        # --- Istio CNI traffic interception ---
        #
        # These annotations are read by the Istio CNI node agent at pod
        # creation time (before any container starts).  The CNI plugin
        # enters the pod network namespace and runs istio-iptables to
        # redirect outbound traffic to port 15001 where our custom sidecar
        # listens.
        #
        # The webhook is NOT triggered for this namespace (see patch-webhook.yaml),
        # so no Envoy container is injected — only our custom sidecar below.

        # Redirect ALL outbound traffic (any IP, any port).
        traffic.sidecar.istio.io/includeOutboundIPRanges: "*"

        # Do NOT redirect inbound traffic — we only care about egress.
        traffic.sidecar.istio.io/includeInboundPorts: ""

        # UID 1337 is excluded from the iptables OUTPUT redirect so the
        # sidecar's own connection to proxy-service is not looped back.
        sidecar.istio.io/proxyUID: "1337"
        sidecar.istio.io/proxyGID: "1337"

        # Exclude Kubernetes DNS (UDP) — only TCP is handled by the sidecar.
        traffic.sidecar.istio.io/excludeOutboundPorts: "53"

        # Exclude the proxy service CIDR as an extra safety net.
        # Replace with the actual ClusterIP if needed.
        # traffic.sidecar.istio.io/excludeOutboundIPRanges: "10.96.0.0/12"
    spec:
      # ------------------------------------------------------------------ #
      # Pod-level security context (required by "restricted" PSA)           #
      # ------------------------------------------------------------------ #
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault

      containers:
        # ---------------------------------------------------------------- #
        # Application container                                             #
        # ---------------------------------------------------------------- #
        - name: app
          image: app:latest
          imagePullPolicy: Never
          env:
            - name: TARGETS
              value: "http://httpbin.org/get,https://httpbin.org/get,http://example.com"
            - name: INTERVAL
              value: "15s"
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10000
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault

        # ---------------------------------------------------------------- #
        # Custom sidecar — transparent egress proxy                        #
        # ---------------------------------------------------------------- #
        - name: sidecar
          image: sidecar:latest
          imagePullPolicy: Never
          ports:
            - name: proxy
              containerPort: 15001
              protocol: TCP
          env:
            - name: LISTEN_ADDR
              value: ":15001"
            # DNS name resolves to the ClusterIP of the central proxy.
            - name: PROXY_ADDR
              value: "proxy-service.proxy.svc.cluster.local:8080"
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            # UID 1337 matches sidecar.istio.io/proxyUID above.
            # Istio CNI adds an iptables rule: -m owner --uid-owner 1337 -j RETURN
            # which exempts this UID from the OUTPUT redirect chain.
            runAsUser: 1337
            runAsGroup: 1337
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
